# Default policy. Used when no per-instance policy file matches an event's
# instance.id. Demonstrates the skills + tools + escalation layer end-to-end.
#
# Pipeline shape:
#   1. TextAgent runs the local skills it knows about (regex + transformers.js)
#   2. Escalation rules below evaluate the partial signal — if local was
#      uncertain about a high-stakes channel (threats, identity-hate), the
#      cloud skill is invoked to fill the gap.
#   3. Final policy rules evaluate the merged signal and emit a routing action.

instance: default
version: 2
basedOn: standard

# Skill governance. Empty allow-list = "every registered skill is allowed".
# Set `blockDataLeavingMachine: true` to be a federated hardliner — it
# prevents the cloud skill from being invoked even if the operator added
# the API key.
skills:
  block: []
  blockExecutionModel: []
  blockDataLeavingMachine: false

# Confidence-based escalation. Local skills triage cheaply; only ambiguous
# or high-stakes cases call the cloud. Skills referenced here must be
# registered in the worker (and not blocked by the `skills:` block above).
escalation:
  - id: escalate-borderline-toxicity
    description: "Local toxic score in the uncertain band (0.4-0.7). Ask Claude for a second opinion."
    when:
      all:
        - { channel: toxic, op: gt, value: 0.4 }
        - { channel: toxic, op: lt, value: 0.7 }
    run:
      - text-classify-toxicity@anthropic

# Shadow runs. These skills fire on *every* event, run silently in parallel,
# and never affect the production signal or routing. When a reviewer commits
# a verdict on the underlying ContentEvent, the runciter pairs it with the
# shadow prediction — every review becomes a free gold-set entry, graded by
# the actual operator. This is what feeds @inertial/eval's continuous
# calibration over time.
#
# If the named skill isn't registered (e.g. ANTHROPIC_API_KEY not set), the
# runciter logs a warning and skips it without failing the event.
shadow:
  - text-classify-toxicity@anthropic

# First-match policy rules over the merged signal.
rules:
  - id: nsfw-deep
    description: "Local NSFW classifier above threshold → deep review"
    if:
      channel: image_nsfw
      op: gt
      value: 0.7
    action:
      kind: queue.deep
      reason: "image_nsfw > 0.7"

  - id: severe-toxicity-deep
    description: "Severe toxicity / threat / identity-hate → deep review"
    if:
      any:
        - { channel: severe_toxic,    op: gt, value: 0.8 }
        - { channel: threat,          op: gt, value: 0.7 }
        - { channel: identity_hate,   op: gt, value: 0.7 }
    action:
      kind: queue.deep
      reason: "severe-toxicity / threat / identity-hate above threshold"

  - id: toxicity-quick
    if:
      channel: toxic
      op: gt
      value: 0.7
    action:
      kind: queue.quick
      reason: "toxicity > 0.7"

  - id: obscene-quick
    if:
      channel: obscene
      op: gt
      value: 0.7
    action:
      kind: queue.quick
      reason: "obscene > 0.7"

  - id: insult-quick
    if:
      channel: insult
      op: gt
      value: 0.75
    action:
      kind: queue.quick
      reason: "insult > 0.75"

  - id: spam-link
    if:
      channel: spam-link-presence
      op: gt
      value: 0.6
    action:
      kind: queue.quick
      reason: "spam-link-presence > 0.6"

default:
  kind: auto-allow
  reason: "no rule matched"
